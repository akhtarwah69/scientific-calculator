<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>SciCalc Premium</title>
    <!-- Add PWA manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="pwa-192x192.png">
    <!-- Load MathJS from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.1/math.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #8b5cf6;
            --accent-secondary: #d946ef;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --button-num: rgba(255, 255, 255, 0.08);
            --button-op: rgba(139, 92, 246, 0.2);
            --button-sci: rgba(255, 255, 255, 0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(217, 70, 239, 0.15) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-primary);
        }

        .calculator-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        @media (max-width: 480px) {
            .calculator-container {
                height: 100%;
                max-height: none;
                border-radius: 0;
                border: none;
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 20px 10px;
            overflow: hidden;
        }

        #history {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            min-height: 1.5em;
            word-break: break-all;
            text-align: right;
            transition: all 0.2s;
        }

        #input {
            font-size: 3.5rem;
            font-weight: 300;
            word-break: break-all;
            text-align: right;
            line-height: 1.1;
            transition: all 0.2s;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .scientific-panel {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 12px;
            opacity: 0.9;
        }

        button {
            border: none;
            border-radius: 20px;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-primary);
            background: var(--button-num);
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        button:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.15);
        }

        button.operator {
            background: var(--button-op);
            color: var(--accent-color);
            font-weight: 600;
        }

        button.scientific {
            background: var(--button-sci);
            font-size: 0.85rem;
            padding: 12px;
            border-radius: 12px;
        }

        button.equals {
            background: linear-gradient(135deg, var(--accent-color), var(--accent-secondary));
            color: white;
        }

        button.clear {
            color: #f43f5e;
        }

        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <div class="header">
            <span>DEG</span>
            <span>SCICALC PREMIUM</span>
        </div>
        
        <div class="display">
            <div id="history"></div>
            <div id="input">0</div>
        </div>

        <div class="scientific-panel">
            <button class="scientific" onclick="append('sin(')">sin</button>
            <button class="scientific" onclick="append('cos(')">cos</button>
            <button class="scientific" onclick="append('tan(')">tan</button>
            <button class="scientific" onclick="append('pi')">π</button>
            <button class="scientific" onclick="append('e')">e</button>
            <button class="scientific" onclick="append('log10(')">log</button>
            <button class="scientific" onclick="append('log(')">ln</button>
            <button class="scientific" onclick="append('(')">(</button>
            <button class="scientific" onclick="append(')')">)</button>
            <button class="scientific" onclick="append('sqrt(')">√</button>
        </div>

        <div class="keypad">
            <button class="clear" onclick="clearAll()">C</button>
            <button class="operator" onclick="backspace()">⌫</button>
            <button class="operator" onclick="append('%')">%</button>
            <button class="operator" onclick="append('/')">÷</button>
            
            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button class="operator" onclick="append('*')">×</button>
            
            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button class="operator" onclick="append('-')">-</button>
            
            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button class="operator" onclick="append('+')">+</button>
            
            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button onclick="append('^')">xʸ</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let expression = '';
        let result = '';
        const historyEl = document.getElementById('history');
        const inputEl = document.getElementById('input');

        function updateDisplay() {
            inputEl.innerText = expression || '0';
            historyEl.innerText = result ? expression + ' =' : '';
            if (result) inputEl.innerText = result;
            
            // Auto scroll to right
            inputEl.scrollLeft = inputEl.scrollWidth;
        }

        function append(val) {
            if (result) {
                if (['+', '-', '*', '/', '%', '^'].includes(val)) {
                    expression = result + val;
                } else {
                    expression = val;
                }
                result = '';
            } else {
                expression += val;
            }
            updateDisplay();
        }

        function clearAll() {
            expression = '';
            result = '';
            updateDisplay();
        }

        function backspace() {
            if (result) {
                result = '';
            } else {
                expression = expression.slice(0, -1);
            }
            updateDisplay();
        }

        function calculate() {
            try {
                if (!expression) return;
                
                // Use mathjs to evaluate
                const evaluated = math.evaluate(expression);
                result = math.format(evaluated, { precision: 10 });
                updateDisplay();
            } catch (err) {
                inputEl.innerText = 'Error';
                setTimeout(() => updateDisplay(), 1000);
            }
        }

        // Ripple Effect
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                let x = e.clientX - e.target.offsetLeft;
                let y = e.clientY - e.target.offsetTop;
                let ripples = document.createElement('span');
                ripples.style.left = x + 'px';
                ripples.style.top = y + 'px';
                ripples.classList.add('ripple');
                this.appendChild(ripples);
                setTimeout(() => ripples.remove(), 600);
            });
        });

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
